name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per branch/PR; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build & test
        run: ./gradlew build --no-daemon

  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Test (tracelight-react)
        run: npm --workspace tracelight-react run test
      - name: Build library
        run: npm --workspace tracelight-react run build
      - name: Build web demo
        run: npm --workspace tracelight-web run build
