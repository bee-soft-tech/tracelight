name: Deploy demo to GitHub Pages

# Builds the tracelight-web app in demo mode (simulated traffic, no backend) and deploys it to
# GitHub Pages at https://bee-soft-tech.github.io/tracelight/.
on:
  push:
    branches: [main]
    paths:
      - 'tracelight-web/**'
      - 'tracelight-react/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build demo
        run: npm --workspace tracelight-web run build
        env:
          VITE_DEMO: 'true'
          VITE_BASE: /tracelight/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tracelight-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
